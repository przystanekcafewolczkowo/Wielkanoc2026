<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Kawiarnia Przystanek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f6f3;
      color: #2c2c2c;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 30px;
    }

    .pdf-preview {
      width: 100%;
      height: 300px;
      border-radius: 12px;
      border: none;
      margin-bottom: 20px;
      background: #fff;
    }

    .button {
      display: inline-block;
      padding: 14px 24px;
      background: #2c2c2c;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
      transition: 0.2s;
    }

    .button:hover {
      background: #000;
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Przystanek</h1>
    <div class="subtitle">Kawiarnia</div>

    <!-- PODGLĄD PDF -->
    <iframe class="pdf-preview" src="menu.pdf"></iframe>

    <!-- POBIERANIE -->
    <a class="button" href="menu.pdf" download>
      Pobierz ofertę (PDF)
    </a>

    <div class="note">
      Na iPhone przytrzymaj i wybierz „Pobierz”
    </div>
  </div>

</body>
</html>
